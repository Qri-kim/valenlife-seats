                  type="text"
                  placeholder="이름, 직무, 팀명 검색..."
                  className="pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl w-full md:w-80 focus:outline-none focus:ring-2 ring-brand-cyan transition-all shadow-sm text-sm"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
            {/* Sidebar: Legend & Teams */}
            <div className="lg:col-span-1 space-y-4">
              <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Organization</h2>
                <div className="space-y-1.5">
                  <button 
                    onClick={() => setSelectedZone(null)}
                    className={`w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${!selectedZone ? 'bg-brand-navy text-white' : 'text-gray-600 hover:bg-gray-100'}`}
                  >
                    전체 도면 보기
                  </button>
                  {OFFICE_DATA.zones.map(zone => (
                    <button 
                      key={zone.id}
                      onClick={() => setSelectedZone(zone.id)}
                      className={`w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-all flex items-center gap-3 border border-transparent
                        ${selectedZone === zone.id ? 'bg-blue-50 text-brand-navy border-blue-100 font-bold' : 'text-gray-600 hover:bg-gray-50'}
                      `}
                    >
                      <div className={`w-2 h-2 rounded-full ${selectedZone === zone.id ? 'bg-brand-cyan' : 'bg-gray-300'}`}></div>
                      {zone.name}
                    </button>
                  ))}
                </div>
              </section>

              <section className="bg-brand-navy p-5 rounded-2xl text-white relative overflow-hidden">
                <div className="absolute top-0 right-0 p-4 opacity-10">
                   <Info size={64} />
                </div>
                <h3 className="font-bold mb-2 flex items-center gap-2 text-brand-cyan text-sm">
                  <Info size={16} /> Guide
                </h3>
                <p className="text-gray-300 text-xs leading-relaxed">
                  좌석이나 아이콘을 클릭하면 상세 정보와 사진을 볼 수 있습니다. 구역 내 빈 공간은 공용 공간 및 통로입니다.
                </p>
              </section>
            </div>

            {/* Main Floor Plan Canvas */}
            <div className="lg:col-span-3">
              <div className="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 relative overflow-hidden h-[600px] w-full">
                
                {/* Base Grid Pattern */}
                <div className="absolute inset-0 opacity-[0.05]" style={{ backgroundImage: 'radial-gradient(#0A1450 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>

                {/* 1. Render Zones (팀 구역 배경) */}
                {OFFICE_DATA.zones.map(zone => {
                  const isActive = !selectedZone || selectedZone === zone.id;
                  return (
                    <div 
                      key={zone.id}
                      className={`absolute border border-dashed rounded-xl transition-all duration-500
                        ${isActive ? 'border-brand-navy/30 bg-blue-50/20' : 'border-gray-200 bg-gray-50/10 opacity-30'}
                      `}
                      style={{ left: `${zone.x}%`, top: `${zone.y}%`, width: `${zone.w}%`, height: `${zone.h}%` }}
                    >
                      <span className={`absolute -top-3 left-3 px-2 py-0.5 text-[10px] font-bold rounded shadow-sm
                        ${isActive ? 'bg-brand-navy text-brand-cyan' : 'bg-gray-200 text-gray-500'}
                      `}>
                        {zone.name}
                      </span>
                    </div>
                  );
                })}

                {/* 2. Render Rooms (회의실 및 라운지, 창고, OA) */}
                {OFFICE_DATA.rooms.map(room => {
                  let IconComponent = Coffee;
                  let styleClass = '';
                  
                  if (room.type === 'meeting') {
                    IconComponent = Monitor;
                    styleClass = 'border-brand-navy bg-white text-brand-navy hover:bg-gray-50';
                  } else if (room.type === 'lounge') {
                    IconComponent = Coffee;
                    styleClass = 'border-brand-cyan bg-white text-brand-cyan hover:bg-gray-50';
                  } else {
                    IconComponent = room.type === 'storage' ? Package : Printer;
                    styleClass = 'border-gray-400 bg-gray-50 text-gray-600 hover:bg-gray-100';
                  }

                  return (
                    <div 
                      key={room.id}
                      onClick={() => setSelectedItem(room)}
                      className={`absolute cursor-pointer border transition-all flex flex-col items-center justify-center p-2 text-center rounded-xl shadow-sm hover:shadow-md ${styleClass}`}
                      style={{ left: `${room.x}%`, top: `${room.y}%`, width: `${room.w}%`, height: `${room.h}%` }}
                    >
                      <IconComponent size={18} className="mb-1 opacity-70" />
                      <span className="text-[10px] font-bold">{room.name}</span>
                    </div>
                  );
                })}

                {/* 3. Render Individual Seats (개인 좌석) */}
                {OFFICE_DATA.seats.map(seat => {
                  const zone = OFFICE_DATA.zones.find(z => z.id === seat.zoneId);
                  const isFilteredOut = (selectedZone && seat.zoneId !== selectedZone) || (searchTerm && !filteredSeats.includes(seat));
                  
                  return (
                    <div 
                      key={seat.id}
                      onClick={() => setSelectedItem({ ...seat, zoneName: zone?.name })}
                      className={`absolute w-8 h-8 cursor-pointer transition-all duration-300 rounded-lg flex items-center justify-center group
                        ${isFilteredOut ? 'opacity-10 scale-75 bg-gray-200' : 'opacity-100 scale-100 bg-brand-navy text-brand-cyan hover:scale-110 shadow-md'}
                      `}
                      style={{ left: `${seat.x}%`, top: `${seat.y}%`, transform: 'translate(-50%, -50%)' }}
                    >
                      <Users size={14} />
                      {/* Hover Tooltip */}
                      <div className="absolute -top-8 left-1/2 -translate-x-1/2 bg-white text-brand-navy border border-gray-200 text-[10px] px-2 py-1 rounded shadow-lg opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap z-10 font-bold">
                        {seat.name || '공석'} {seat.role ? `(${seat.role.replace('\n', ' / ')})` : ''}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Legend Bottom */}
              <div className="mt-4 flex items-center justify-end gap-6 text-xs text-gray-500">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 border border-dashed border-brand-navy/50 bg-blue-50/20 rounded"></div>
                  <span>팀 구역</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-4 h-4 rounded-md bg-brand-navy text-brand-cyan flex items-center justify-center"><Users size={8}/></div>
                  <span>직원 좌석</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-4 h-4 rounded border border-brand-navy bg-white"></div>
                  <span>회의실</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-4 h-4 rounded border border-brand-cyan bg-white"></div>
                  <span>라운지/공용공간</span>
                </div>
                <div className="flex items-center gap-2">
                  <div className="w-4 h-4 rounded border border-gray-400 bg-gray-50"></div>
                  <span>창고/OA</span>
                </div>
              </div>
            </div>
          </main>

          {/* Detail Modal */}
          {selectedItem && (
            <div className="fixed inset-0 bg-brand-navy/80 backdrop-blur-sm flex items-center justify-center p-4 z-50" onClick={() => setSelectedItem(null)}>
              <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-200 border border-gray-100" onClick={e => e.stopPropagation()}>
                {/* Header */}
                <div className={`h-20 ${selectedItem.role !== undefined ? 'bg-brand-navy' : (selectedItem.type === 'meeting' ? 'bg-gray-100' : 'bg-brand-cyan/10')} flex items-center px-6 border-b border-gray-200`}>
                   {selectedItem.role !== undefined ? (
                     <div className="flex items-center gap-3">
                       <div className="w-10 h-10 rounded-full bg-brand-cyan flex items-center justify-center text-brand-navy font-bold">
                         {selectedItem.name ? selectedItem.name.charAt(0) : '?'}
                       </div>
                       <div>
                         <h3 className="text-white text-lg font-bold">{selectedItem.name || '공석'}</h3>
                         <p className="text-brand-cyan text-xs whitespace-pre-line">{selectedItem.role}</p>
                       </div>
                     </div>
                   ) : (
                     <h3 className="text-brand-navy text-lg font-bold flex items-center gap-2">
                       {selectedItem.type === 'meeting' && <Monitor className="text-gray-500" />}
                       {selectedItem.type === 'lounge' && <Coffee className="text-brand-cyan" />}
                       {selectedItem.type === 'storage' && <Package className="text-gray-500" />}
                       {selectedItem.type === 'oa' && <Printer className="text-gray-500" />}
                       {selectedItem.name}
                     </h3>
                   )}
                </div>
                
                {/* Body */}
                <div className="p-6 space-y-4">
                {selectedItem.role !== undefined ? (
                  <div className="space-y-3">
                    <div className="flex justify-between items-center py-2 border-b border-gray-50">
                      <span className="text-gray-400 text-sm">소속</span>
                      <span className="font-semibold text-brand-navy text-sm">{selectedItem.customZoneName || selectedItem.zoneName || '미정'}</span>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {selectedItem.isStorage ? (
                      <div className="bg-gray-50 p-5 rounded-xl border border-gray-200">
                        <p className="font-bold text-brand-navy mb-3 text-base">창고 사용시 주의 사항</p>
                        <div className="text-sm text-gray-700 space-y-2 font-medium">
                          <p>• 물품 보관시 소속 팀/파트 선반 이용</p>
                          <p>• 보관 박스 소진 시, 담당자/브랜드/보관기한 등을 기입해주세요</p>
                        </div>
                      </div>
                    ) : selectedItem.tags ? (
                      <div className="flex flex-wrap gap-2 pt-2">
                        {selectedItem.tags.map((tag, idx) => (
                          <span key={idx} className={`px-3.5 py-2.5 rounded-xl text-sm font-bold shadow-sm ${tag.style}`}>
                            {tag.text}
                          </span>
                        ))}
                      </div>
                    ) : null}
                  </div>
                )}
                  <button 
                    onClick={() => setSelectedItem(null)}
                    className="w-full text-gray-400 py-2 text-sm hover:text-brand-navy transition-colors font-medium mt-4"
                  >
                    닫기
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
